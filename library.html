<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE Library</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0f19;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:#2563eb;
color:white;
}

.book{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.book a{
color:#60a5fa;
text-decoration:none;
font-weight:bold;
}

.del{
background:#ef4444;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 کتابخانه JAHCORE</h1>

<div class="card">

<h3>➕ افزودن کتاب</h3>

<input id="title" placeholder="عنوان کتاب">
<input id="author" placeholder="نویسنده">
<input id="url" placeholder="لینک یا متن کتاب">

<button onclick="addBook()">افزودن کتاب</button>

</div>

<div class="card">

<h3>📖 کتاب‌های من</h3>

<div id="list">در حال بارگذاری...</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
query,
where,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

let uid;

/* USER */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
return;
}
uid = user.uid;
loadBooks();
});

/* ADD BOOK */
window.addBook = async function(){

let title = document.getElementById("title").value;
let author = document.getElementById("author").value;
let url = document.getElementById("url").value;

if(!title || !author) return alert("پر کن");

await addDoc(collection(db,"books"),{
title,
author,
url,
uid,
createdAt:serverTimestamp()
});

loadBooks();
}

/* LOAD BOOKS */
async function loadBooks(){

let q = query(collection(db,"books"), where("uid","==",uid));
let snap = await getDocs(q);

let html = "";

snap.forEach((d)=>{
let b = d.data();

html += `
<div class="book">
<div>
<b>${b.title}</b><br>
<small>${b.author}</small><br>
<a href="reader.html?id=${d.id}">📖 مطالعه</a>
</div>

<button class="del" onclick="delBook('${d.id}')">حذف</button>
</div>
`;
});

document.getElementById("list").innerHTML =
html || "هیچ کتابی ندارید";
}

/* DELETE */
window.delBook = async function(id){
await deleteDoc(doc(db,"books",id));
loadBooks();
}

</script>

</body>
</html>
