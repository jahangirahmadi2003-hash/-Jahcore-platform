<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE Settings</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0f19;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.blue{
background:#2563eb;
color:white;
}

.red{
background:#ef4444;
color:white;
}

.gray{
background:#374151;
color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 تنظیمات حساب</h1>

<div class="card">

<h3>تغییر رمز عبور</h3>

<input id="newPass" type="password" placeholder="رمز جدید">

<button class="blue" onclick="changePassword()">تغییر رمز</button>

</div>

<div class="card">

<h3>اطلاعات حساب</h3>

<p>ایمیل: <span id="email">...</span></p>

<button class="gray" onclick="logout()">خروج از حساب</button>

<button class="red" onclick="deleteAccount()">حذف حساب</button>

</div>

</div>

<script type="module">

import { auth } from "./firebase.js";
import {
onAuthStateChanged,
signOut,
deleteUser,
updatePassword
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

/* USER */
let userRef;

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="login.html";
return;
}

userRef = user;
document.getElementById("email").innerText = user.email;

});

/* CHANGE PASSWORD */
window.changePassword = async function(){

let newPass = document.getElementById("newPass").value;

if(!newPass) return alert("رمز وارد کن");

try{
await updatePassword(userRef,newPass);
alert("رمز تغییر کرد");
}catch(e){
alert("نیاز به ورود دوباره داری (logout/login)");
}
}

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

/* DELETE ACCOUNT */
window.deleteAccount = async function(){

if(!confirm("آیا مطمئن هستی؟")) return;

try{
await deleteUser(userRef);
alert("حساب حذف شد");
window.location.href="register.html";
}catch(e){
alert("خطا: دوباره وارد شو");
}

}

</script>

</body>
</html>
