<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE AI</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0f19;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:20px;
background:#1f2937;
padding:15px;
border-radius:10px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 JAHCORE AI</h1>

<div class="card">

<textarea id="input" rows="5" placeholder="سوال یا متن خود را بنویس..."></textarea>

<button onclick="askAI()">ارسال</button>

<div class="result" id="output">نتیجه اینجا نمایش داده می‌شود</div>

</div>

</div>

<script>

window.askAI = function(){

let text = document.getElementById("input").value.toLowerCase();
let out = "";

if(text.includes("کتاب")){
out = "📚 خلاصه: این بخش درباره کتاب‌ها و مطالعه دیجیتال در JAHCORE است.";
}

else if(text.includes("کیف پول")){
out = "💰 کیف پول JAHCORE برای ذخیره، برداشت و مدیریت دارایی استفاده می‌شود.";
}

else if(text.includes("تبلیغات")){
out = "📢 سیستم تبلیغات JAHCORE امکان درآمدزایی از نمایش تبلیغ را فراهم می‌کند.";
}

else if(text.includes("سلام")){
out = "👋 سلام! من دستیار JAHCORE هستم. چطور کمک کنم؟";
}

else{
out = "🤖 من هنوز برای این موضوع آموزش ندیده‌ام، ولی در نسخه بعدی هوشمندتر می‌شوم.";
}

document.getElementById("output").innerText = out;
}

</script>

</body>
</html>
