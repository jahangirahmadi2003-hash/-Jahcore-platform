<script type="module">

import { auth, db } from "./firebase.js";
import { 
onAuthStateChanged, 
signOut 
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import { 
doc, 
getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

/* USER + DATA LOAD */
onAuthStateChanged(auth, async (user) => {

if(!user){
window.location.href="login.html";
return;
}

/* USER INFO */
let snap = await getDoc(doc(db,"users",user.uid));
let data = snap.data();

document.getElementById("welcome").innerText =
"خوش آمدی " + data.username;

document.getElementById("balance").innerText =
(data.wallet || 0) + "$";

document.getElementById("walletBalance").innerText =
(data.wallet || 0) + " USD";

/* BOOK COUNT REAL */
let q = query(collection(db,"books"), where("uid","==",user.uid));
let booksSnap = await getDocs(q);

document.getElementById("books").innerText =
booksSnap.size;

/* BOOK LIST REAL */
let html = "";

if(booksSnap.empty){
html = "هنوز کتابی ندارید";
} else {

booksSnap.forEach((d)=>{
let b = d.data();

html += `
<div style="background:#1f2937;padding:15px;border-radius:12px;margin-bottom:10px">
<h3>${b.title}</h3>
<p>${b.author}</p>

<a href="${b.url}" target="_blank"
style="color:#60a5fa">📖 خواندن</a>
</div>
`;
});
}

document.getElementById("library").innerHTML = html;

});

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

  </script>
