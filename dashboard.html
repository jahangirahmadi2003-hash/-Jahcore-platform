<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0f19;
color:white;
display:flex;
}

.sidebar{
width:270px;
height:100vh;
background:#0f172a;
position:fixed;
right:0;
top:0;
padding:20px;
}

.logo{
font-size:26px;
font-weight:bold;
margin-bottom:25px;
}

.menu a{
display:flex;
gap:10px;
padding:12px;
margin:8px 0;
text-decoration:none;
color:white;
background:#111827;
border-radius:10px;
}

.menu a:hover{
background:#2563eb;
}

.main{
margin-right:270px;
padding:25px;
width:100%;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#111827;
padding:18px;
border-radius:14px;
}

.card h2{
color:#60a5fa;
margin:0;
}

.section{
margin-top:30px;
}

.box{
background:#111827;
padding:15px;
border-radius:12px;
}

.empty{
text-align:center;
color:#9ca3af;
padding:20px;
}

button{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">⚡ JAHCORE</div>

<div class="menu">
<a href="#"><i class="fas fa-home"></i> خانه</a>
<a href="library.html"><i class="fas fa-book"></i> کتابخانه</a>
<a href="wallet.html"><i class="fas fa-wallet"></i> کیف پول</a>
<a href="settings.html"><i class="fas fa-cog"></i> تنظیمات</a>
<a href="#" onclick="logout()"><i class="fas fa-sign-out"></i> خروج</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2 id="welcome">...</h2>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<h2 id="books">0</h2>
<p>کتاب‌ها</p>
</div>

<div class="card">
<h2 id="balance">0$</h2>
<p>کیف پول</p>
</div>

<div class="card">
<h2 id="username">-</h2>
<p>کاربر</p>
</div>

</div>

<!-- WALLET -->
<div class="section">
<h3>💰 کیف پول</h3>
<div class="box" id="walletBox">...</div>
</div>

<!-- LIBRARY -->
<div class="section">
<h3>📚 کتابخانه من</h3>
<div class="box" id="library">در حال بارگذاری...</div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

let snap = await getDoc(doc(db,"users",user.uid));
let data = snap.data() || {};

/* USER */
document.getElementById("welcome").innerText =
"سلام " + (data.username || "کاربر");

document.getElementById("username").innerText =
data.username || "-";

/* WALLET */
let wallet = data.wallet || 0;
document.getElementById("balance").innerText = wallet + "$";

document.getElementById("walletBox").innerHTML = `
💰 موجودی شما<br><h2 style="color:#60a5fa">${wallet} USD</h2>
`;

/* BOOKS */
let q = query(collection(db,"books"), where("uid","==",user.uid));
let booksSnap = await getDocs(q);

document.getElementById("books").innerText = booksSnap.size;

/* LIBRARY */
let html = "";

if(booksSnap.empty){
html = `
<div class="empty">
📭 هنوز کتاب نداری<br><br>
<a href="library.html" style="color:#60a5fa">➕ افزودن کتاب</a>
</div>`;
}else{

booksSnap.forEach((d)=>{
let b = d.data();

html += `
<div style="margin-bottom:10px">
<b>${b.title}</b><br>
<small>${b.author || "نامشخص"}</small><br>
<a href="reader.html?id=${d.id}" style="color:#60a5fa">📖 مطالعه</a>
</div>
`;
});
}

document.getElementById("library").innerHTML = html;

});

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
