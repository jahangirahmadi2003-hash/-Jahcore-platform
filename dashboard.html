<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE Dashboard</title>

<style>
body{margin:0;font-family:tahoma;background:#0b0f19;color:white;display:flex}
.sidebar{width:260px;height:100vh;background:#111827;position:fixed;right:0;padding:20px}
.main{margin-right:260px;padding:20px;width:100%}
.card{background:#1f2937;padding:15px;border-radius:10px;margin-bottom:10px}
a{color:#60a5fa;text-decoration:none}
.empty{text-align:center;color:#aaa;padding:20px}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ JAHCORE</h2>

<a href="#">خانه</a><br>
<a href="library.html">کتابخانه</a><br>
<a href="wallet.html">کیف پول</a><br>
<a href="settings.html">تنظیمات</a><br>

<a href="#" onclick="logout()">خروج</a>
</div>

<!-- MAIN -->
<div class="main">

<h2 id="welcome">...</h2>

<div class="card">
<h3>📚 کتاب‌ها: <span id="books">0</span></h3>
</div>

<div class="card" id="library">
در حال بارگذاری...
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

/* BOOKS */
let q = query(collection(db,"books"), where("uid","==",user.uid));
let booksSnap = await getDocs(q);

document.getElementById("books").innerText = booksSnap.size;

/* LIBRARY */
let html = "";

if(booksSnap.empty){
html = `
<div class="empty">
📭 هنوز کتاب نداری<br><br>
<a href="library.html">➕ افزودن کتاب</a>
</div>`;
}else{

booksSnap.forEach((d)=>{
let b = d.data();

html += `
<div class="card">
<b>${b.title}</b><br>
<small>${b.author || "نامشخص"}</small><br>
<a href="reader.html?id=${d.id}">📖 مطالعه</a>
</div>
`;
});
}

document.getElementById("library").innerHTML = html;

});

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
