<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHCORE Reader</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0b0f19;
color:white;
transition:0.3s;
}

.topbar{
position:fixed;
top:0;
right:0;
left:0;
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.controls button{
margin:0 5px;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
}

.container{
max-width:800px;
margin:auto;
padding:100px 20px;
line-height:2;
font-size:18px;
}

/* DARK / LIGHT */
.light{
background:#f1f5f9;
color:black;
}

.light .topbar{
background:#e2e8f0;
}

.light .controls button{
background:#1e3a8a;
}
</style>
</head>

<body>

<div class="topbar">
<div id="title">📖 کتاب</div>

<div class="controls">
<button onclick="fontUp()">A+</button>
<button onclick="fontDown()">A-</button>
<button onclick="toggleTheme()">🌙</button>
<button onclick="goBack()">⬅</button>
</div>
</div>

<div class="container" id="content">
در حال بارگذاری...
</div>

<script type="module">

import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let fontSize = 18;

/* LOAD BOOK */
async function loadBook(){

let snap = await getDoc(doc(db,"books",id));

if(!snap.exists()){
document.getElementById("content").innerText="کتاب پیدا نشد";
return;
}

let book = snap.data();

document.getElementById("title").innerText = book.title;

let saved = localStorage.getItem("read_"+id);

document.getElementById("content").innerText =
book.url || "محتوای کتاب موجود نیست";

if(saved){
document.getElementById("content").innerText = saved;
}
}

loadBook();

/* FONT CONTROL */
window.fontUp = function(){
fontSize += 2;
document.getElementById("content").style.fontSize = fontSize+"px";
saveProgress();
}

window.fontDown = function(){
fontSize -= 2;
document.getElementById("content").style.fontSize = fontSize+"px";
saveProgress();
}

/* THEME */
window.toggleTheme = function(){
document.body.classList.toggle("light");
}

/* BACK */
window.goBack = function(){
history.back();
}

/* SAVE READING */
function saveProgress(){
localStorage.setItem(
"read_"+id,
document.getElementById("content").innerText
);
}

setInterval(saveProgress,5000);

</script>

</body>
</html>
