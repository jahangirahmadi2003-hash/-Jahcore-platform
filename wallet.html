<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAHCORE - کیف پول TON مستقل</title>
  <script src="https://cdn.jsdelivr.net/npm/tonweb@0.0.66/dist/tonweb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ton/crypto@3.2.0/dist/index.js"></script>
  
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: white;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
    }
    .card {
      background: #1e2937;
      border-radius: 16px;
      padding: 20px;
      margin: 15px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 20px; color: #60a5fa; }
    button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
    }
    .btn-create { background: #22c55e; color: black; }
    .btn-restore { background: #3b82f6; color: white; }
    .btn-send { background: #f59e0b; color: white; }
    textarea {
      width: 100%;
      height: 140px;
      background: #334155;
      color: white;
      border: 1px solid #475569;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
    }
    .address {
      word-break: break-all;
      font-size: 15px;
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
    }
    .seed {
      background: #eab30833;
      padding: 15px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>کیف پول TON</h1>
    <p style="text-align:center; color:#94a3b8;">کاملاً مستقل - مثل TonKeeper</p>

    <div class="card">
      <button class="btn-create" onclick="createNewWallet()">ایجاد کیف پول جدید</button>
      <button class="btn-restore" onclick="showRestore()">بازیابی کیف پول</button>
    </div>

    <!-- صفحه اصلی والت -->
    <div id="walletScreen" class="card" style="display:none;">
      <p><strong>آدرس شما:</strong></p>
      <p class="address" id="walletAddress"></p>
      
      <button onclick="getBalance()">نمایش بالانس</button>
      <button class="btn-send" onclick="sendTransaction()">ارسال TON</button>
    </div>

    <!-- نمایش Seed Phrase -->
    <div id="seedScreen" class="card" style="display:none;">
      <h3 style="color:#eab308;">Seed Phrase (۲۴ کلمه)</h3>
      <p class="seed" id="seedPhrase"></p>
      <button onclick="copySeed()">کپی کردن Seed Phrase</button>
      <p style="color:red; font-size:14px; margin-top:10px;">
        ⚠️ این عبارت را جایی امن بنویسید. اگر گم شود، پول شما از بین می‌رود!
      </p>
    </div>

    <!-- بخش بازیابی -->
    <div id="restoreScreen" class="card" style="display:none;">
      <textarea id="mnemonicInput" placeholder="۲۴ کلمه Seed Phrase را اینجا وارد کنید..."></textarea>
      <button class="btn-restore" onclick="restoreWallet()">بازیابی والت</button>
    </div>
  </div>

  <script>
    let currentWallet = null;
    const tonweb = new TonWeb();

    async function createNewWallet() {
      try {
        const mnemonic = await window.TonCrypto.mnemonicNew(24);
        const keyPair = await window.TonCrypto.mnemonicToPrivateKey(mnemonic);
        const wallet = tonweb.wallet.create({ publicKey: keyPair.publicKey });
        const address = await wallet.getAddress();

        currentWallet = {
          mnemonic: mnemonic,
          address: address.toString(true, true, true)
        };

        document.getElementById('walletScreen').style.display = 'block';
        document.getElementById('seedScreen').style.display = 'block';
        document.getElementById('walletAddress').textContent = currentWallet.address;
        document.getElementById('seedPhrase').textContent = mnemonic.join(" ");

        alert("✅ کیف پول جدید ساخته شد!\nSeed Phrase را حتماً ذخیره کنید.");
      } catch (e) {
        alert("خطا در ساخت والت");
      }
    }

    function showRestore() {
      document.getElementById('restoreScreen').style.display = 'block';
    }

    async function restoreWallet() {
      const input = document.getElementById('mnemonicInput').value.trim();
      const words = input.split(/\s+/).filter(w => w.length > 0);

      if (words.length !== 24) {
        return alert("باید دقیقاً ۲۴ کلمه وارد کنید");
      }

      try {
        const keyPair = await window.TonCrypto.mnemonicToPrivateKey(words);
        const wallet = tonweb.wallet.create({ publicKey: keyPair.publicKey });
        const address = await wallet.getAddress();

        currentWallet = { mnemonic: words, address: address.toString(true, true, true) };

        document.getElementById('walletScreen').style.display = 'block';
        document.getElementById('walletAddress').textContent = currentWallet.address;

        alert("✅ والت با موفقیت بازیابی شد");
      } catch (e) {
        alert("Seed Phrase نامعتبر است");
      }
    }

    async function getBalance() {
      if (!currentWallet) return alert("ابتدا والت بسازید یا بازیابی کنید");
      try {
        const balance = await tonweb.getBalance(currentWallet.address);
        const ton = TonWeb.utils.fromNano(balance);
        alert(`بالانس شما: ${ton} TON`);
      } catch (e) {
        alert("خطا در دریافت بالانس");
      }
    }

    function copySeed() {
      const text = document.getElementById('seedPhrase').textContent;
      navigator.clipboard.writeText(text);
      alert("✅ Seed Phrase کپی شد");
    }

    function sendTransaction() {
      if (!currentWallet) return alert("ابتدا والت بسازید");
      const to = prompt("آدرس مقصد TON را وارد کنید:");
      const amount = prompt("مقدار TON برای ارسال:");
      if (to && amount) {
        alert(`در نسخه کامل ارسال انجام خواهد شد.\n\nمقصد: ${to}\nمقدار: ${amount} TON`);
      }
    }
  </script>
</body>
  </html>
